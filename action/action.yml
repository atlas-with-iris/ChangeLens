name: "ChangeLens — Impact Estimate"
description: "Pre-merge change impact visualizer. Posts an Impact Card on your PRs."
author: "Atlas with Iris"

branding:
  icon: "search"
  color: "blue"

inputs:
  project-path:
    description: "Path to the project root (default: repository root)"
    required: false
    default: "."
  max-depth:
    description: "Maximum consumer traversal depth (default: 2)"
    required: false
    default: "2"
  fail-on-high:
    description: "Fail the check if risk tier is HIGH (default: false)"
    required: false
    default: "false"
  shield:
    description: "Enable DiffShield policy enforcement (default: true)"
    required: false
    default: "true"

outputs:
  risk-tier:
    description: "Risk tier: LOW, MEDIUM, or HIGH"
  consumer-count:
    description: "Number of downstream consumers affected"
  impact-card:
    description: "Full Impact Card as JSON"
  shield-action:
    description: "DiffShield verdict: evaluated or disabled"

runs:
  using: "node20"
  main: "run.js"
